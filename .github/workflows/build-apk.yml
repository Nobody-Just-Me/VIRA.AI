name: Build VIRA APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'
        
    - name: Install Uno Platform Templates
      run: dotnet new install Uno.Templates
      
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build APK
      run: |
        dotnet publish VIRA.Mobile/VIRA.Mobile.csproj \
          -f net8.0-android \
          -c Release \
          -p:AndroidPackageFormat=apk
      
    - name: Find APK
      id: find-apk
      run: |
        APK_PATH=$(find VIRA.Mobile/bin/Release/net8.0-android -name "*.apk" -type f | head -n 1)
        echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
        echo "Found APK: $APK_PATH"
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: VIRA-Release-APK
        path: ${{ steps.find-apk.outputs.apk_path }}
        retention-days: 30
        
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.find-apk.outputs.apk_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
